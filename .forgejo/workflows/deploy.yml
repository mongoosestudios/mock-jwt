name: Build and Deploy
enable-email-notifications: true

on:
  push:
#    tags:
#      - '*'
jobs:
  build:
    runs-on: default
    container: mongoosestudios/build-container:latest
    steps:
      - name: Login to Docker Hub
        uses: https://github.com/docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: checkout
        uses: https://data.forgejo.org/actions/checkout@v6
      - name: install Go
        uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'
      - name: build
        run: CGO_ENABLED=0 go build
      - name: docker build and push
        uses: https://github.com/docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            "mongoosestudios/mock-jwt:${{ env.FORGEJO_REF_NAME }}",
            "mongoosestudios/mock-jwt:latest"
          

