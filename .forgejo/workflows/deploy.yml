name: Build and Deploy
enable-email-notifications: true

on:
  workflow_run:
    workflows: ["Testing"]
    types:
      - completed
#    tags:
#      - '*'
jobs:
  build:
    runs-on: docker
    steps:
      - name: Login to Docker Hub
        uses: https://github.com/docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Set up QEMU
        uses: https://github.com/docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: https://github.com/docker/setup-buildx-action@v4
      - name: checkout
        uses: https://data.forgejo.org/actions/checkout@v6
      - name: install Go
        uses: https://data.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: 'go.sum'
      - name: build
        run: CGO_ENABLED=0 go build
      - name: get-version
        uses: https://github.com/jannemattila/get-version-from-tag@v4
      - name: docker build and push
        uses: https://github.com/docker/build-push-action@v7
        with:
          push: true
          tags: mongoosestudios/mock-jwt:${{ steps.get-version.outputs.version }}

